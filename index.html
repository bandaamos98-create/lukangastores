<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukanga Stores | TVs, Fridges & Furniture - Kabwe, Zambia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('images/furniture-hero.jpg') center/cover;
            min-height: 85vh;
        }
        .product-card:hover { transform: translateY(-8px); transition: all 0.3s ease; }
        .floating-whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<!-- NAVBAR, HERO, BANNER, WHY CHOOSE US, TESTIMONIALS, ABOUT US, CONTACT, FOOTER remain the same as you have -->
<!-- (I kept them unchanged for brevity - just copy from your current code if you want, but they are already correct) -->

<!-- FLOATING WHATSAPP -->
<a href="https://wa.me/260979077079" target="_blank"
   class="floating-whatsapp bg-green-600 hover:bg-green-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-2xl text-3xl">
    <i class="fa-brands fa-whatsapp"></i>
</a>

<script>
// ==================== IMPROVED PRODUCTS LOADER (with better debugging) ====================
let products = [];

async function loadProducts() {
    try {
        console.log("🔄 Trying to load products.json from:", window.location.origin + "/products.json");
        
        const response = await fetch('products.json');
        
        if (!response.ok) {
            throw new Error(`HTTP Error ${response.status} - File not found or blocked`);
        }
        
        products = await response.json();
        
        console.log(`✅ Successfully loaded ${products.length} products`);
        
        renderFeatured();
        renderProducts(products);
    } catch (error) {
        console.error("❌ Failed to load products.json:", error);
        
        const errorMsg = `
            <div class="col-span-full text-center py-16">
                <i class="fa-solid fa-circle-exclamation text-6xl text-red-500 mb-4"></i>
                <h3 class="text-xl font-semibold text-red-400 mb-2">Products could not be loaded</h3>
                <p class="text-zinc-400">Please make sure <strong>products.json</strong> exists in the root folder.</p>
                <p class="text-sm text-zinc-500 mt-4">Error: ${error.message}</p>
            </div>`;
        
        document.getElementById('product-grid').innerHTML = errorMsg;
        document.getElementById('featured-grid').innerHTML = errorMsg;
        
        alert("Products file not found.\n\nMake sure:\n1. The file is named exactly 'products.json' (lowercase)\n2. It is in the same folder as index.html (root folder)\n3. You have committed & pushed it to GitHub");
    }
}

function renderProducts(filtered = products, containerId = 'product-grid') {
    const grid = document.getElementById(containerId);
    grid.innerHTML = '';
    filtered.forEach(p => {
        const whatsappMsg = encodeURIComponent(`Hi Lukanga Stores,\nI'm interested in:\n${p.name}\nPrice: ZMW ${p.price}/${p.unit}\nPlease send more details.`);
        const html = `
            <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                <img src="${p.img}" alt="${p.name}" class="w-full h-56 object-cover">
                <div class="p-6">
                    <div class="text-xs uppercase tracking-widest text-amber-400 mb-1">${p.category}</div>
                    <h4 class="font-semibold text-xl">${p.name}</h4>
                    <p class="text-zinc-400 text-sm mt-3 line-clamp-3">${p.desc}</p>
                    <p class="text-amber-400 text-2xl font-medium mt-4">ZMW ${p.price} <span class="text-sm text-zinc-400">/${p.unit}</span></p>
                    <div class="mt-6 flex gap-3">
                        <a href="https://wa.me/260979077079?text=${whatsappMsg}" target="_blank" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3.5 rounded-3xl font-medium flex items-center justify-center gap-2">
                            <i class="fa-brands fa-whatsapp"></i> WhatsApp
                        </a>
                        <a href="tel:0979077079" class="flex-1 border border-zinc-700 hover:border-amber-400 py-3.5 rounded-3xl font-medium flex items-center justify-center gap-2">
                            <i class="fa-solid fa-phone"></i> Call
                        </a>
                    </div>
                </div>
            </div>`;
        grid.innerHTML += html;
    });
}

function renderFeatured() {
    renderProducts(products.slice(0, 4), 'featured-grid');
}

function filterProducts() {
    const term = (document.getElementById('search-input').value || document.getElementById('search-input-mobile').value || "").toLowerCase().trim();
    if (!term) return renderProducts(products);
    const filtered = products.filter(p =>
        p.name.toLowerCase().includes(term) || p.category.toLowerCase().includes(term)
    );
    renderProducts(filtered);
}

function focusSearch() {
    const input = window.innerWidth >= 768 ? document.getElementById('search-input') : document.getElementById('search-input-mobile');
    input.focus();
    navigateTo('shop');
}

function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-input-mobile').value = '';
    renderProducts(products);
}

function navigateTo(section) {
    document.getElementById(section).scrollIntoView({ behavior: 'smooth' });
}

// Start the website
window.onload = () => {
    loadProducts();
};
</script>
</body>
</html>
